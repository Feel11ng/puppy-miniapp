<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Питомник щенков</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app">
        <div class="top-bar">
            <h1 id="page-title">&#x1F43E; Мои щенки</h1>
            <button class="btn-icon" id="btn-settings" onclick="showSettings()">&#x2699;&#xFE0F;</button>
        </div>
        <div class="nav-tabs">
            <button class="tab active" data-tab="puppies" onclick="switchTab('puppies')">&#x1F436; Щенки</button>
            <button class="tab" data-tab="posts" onclick="switchTab('posts')">&#x1F4DD; Посты</button>
            <button class="tab" data-tab="ai" onclick="switchTab('ai')">&#x1F916; AI</button>
        </div>
        <div id="content"></div>
    </div>
    <div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 id="modal-title"></h2>
                <button class="btn-close" onclick="hideModal()">&times;</button>
            </div>
            <div id="modal-body" class="modal-body"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
