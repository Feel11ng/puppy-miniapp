<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Питомник щенков</title>
    <link rel="stylesheet" href="style.css?v=1773565491">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app">
        <!-- Верхняя панель -->
        <div class="top-bar">
            <h1 id="page-title">🐾 Мои щенки</h1>
            <button class="btn-icon" id="btn-settings" onclick="showSettings()">⚙️</button>
        </div>

        <!-- Навигация -->
        <div class="nav-tabs">
            <button class="tab active" data-tab="puppies" onclick="switchTab('puppies')">🐶 Щенки</button>
            <button class="tab" data-tab="posts" onclick="switchTab('posts')">📝 Посты</button>
            <button class="tab" data-tab="ai" onclick="switchTab('ai')">🤖 AI</button>
        </div>

        <!-- Контент -->
        <div id="content">
            <!-- Заполняется через JS -->
        </div>
    </div>

    <!-- Модальное окно -->
    <div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 id="modal-title">Заголовок</h2>
                <button class="btn-close" onclick="hideModal()">&times;</button>
            </div>
            <div id="modal-body" class="modal-body">
            </div>
        </div>
    </div>

    <script src="app.js?v=1773565491"></script>
</body>
</html>
